services:
    laravel.test:
        build:
            context: './vendor/laravel/sail/runtimes/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - pgsql
            - redis
    pgsql:
        image: 'postgres:18-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql'
            - './vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    bitcoind:
        image: ruimarinho/bitcoin-core:latest
        command: >
            -regtest=1
            -server=1
            -rpcuser=sail
            -rpcpassword=password
            -rpcallowip=0.0.0.0/0
            -rpcbind=0.0.0.0
            -rpcport=18443
            -port=18444
            -txindex=1
            -fallbackfee=0.0002
        volumes:
            - bitcoind-data:/home/bitcoin/.bitcoin
        networks:
            - sail

    litecoind:
        image: litecoinproject/litecoin-core:latest
        command: >
            -regtest=1
            -server=1
            -rpcuser=sail
            -rpcpassword=password
            -rpcallowip=0.0.0.0/0
            -rpcbind=0.0.0.0
            -rpcport=19443
            -port=19444
            -txindex=1
        volumes:
            - litecoind-data:/home/litecoin/.litecoin
        networks:
            - sail

    dashd:
        image: dashpay/dashd:latest
        command: >
            dashd
            -regtest=1
            -server=1
            -rpcuser=sail
            -rpcpassword=password
            -rpcallowip=0.0.0.0/0
            -rpcbind=0.0.0.0
            -rpcport=19998
            -port=19999
        volumes:
            - dashd-data:/dash/.dashcore
        networks:
            - sail

networks:
    sail:
        driver: bridge
volumes:
    sail-pgsql:
        driver: local
    sail-redis:
        driver: local
    bitcoin-data:
        driver: local
    litecoin-data:
        driver: local
    dashd-data:
        driver: local
