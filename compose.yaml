services:
    laravel.test:
        build:
            context: './vendor/laravel/sail/runtimes/8.5'
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${WWWGROUP}'
        image: 'sail-8.5/app'
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${WWWUSER}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
            IGNITION_LOCAL_SITES_PATH: '${PWD}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - pgsql
            - redis
    pgsql:
        image: 'postgres:18-alpine'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        environment:
            PGPASSWORD: '${DB_PASSWORD:-secret}'
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - 'sail-pgsql:/var/lib/postgresql'
            - './vendor/laravel/sail/database/pgsql/create-testing-database.sql:/docker-entrypoint-initdb.d/10-create-testing-database.sql'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - pg_isready
                - '-q'
                - '-d'
                - '${DB_DATABASE}'
                - '-U'
                - '${DB_USERNAME}'
            retries: 3
            timeout: 5s
    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    bitcoind:
        image: ruimarinho/bitcoin-core:latest
        command: >
            -conf=/etc/bitcoin/bitcoin.conf
            -datadir=/home/bitcoin/.bitcoin
            -printtoconsole
        volumes:
            - bitcoind-data:/home/bitcoin/.bitcoin
            - ./nodes/bitcoin/bitcoin.conf:/etc/bitcoin/bitcoin.conf:ro
        networks:
            - sail

    litecoind:
        image: litecoinproject/litecoin-core:latest
        command: >
            -conf=/etc/litecoin/litecoin.conf
            -datadir=/home/litecoin/.litecoin
            -printtoconsole
        volumes:
            - litecoind-data:/home/litecoin/.litecoin
            - ./nodes/ltc/litecoin.conf:/etc/litecoin/litecoin.conf:ro
        networks:
            - sail

    dashd:
        image: dashpay/dashd:latest
        command: >
            /usr/local/bin/dashd -conf=/dash/.dashcore/dash.conf
        volumes:
            - dashd-data:/dash/.dashcore
            - ./nodes/dash/dash.conf:/dash/.dashcore/dash.conf:ro
        networks:
            - sail
    anvil:
        image: ghcr.io/foundry-rs/foundry:latest
        entrypoint: [ "/bin/sh", "/scripts/start-anvil.sh" ]
        ports:
            - '8545:8545'
        volumes:
            - ./nodes/anvil:/data
            - ./nodes/anvil/start-anvil.sh:/scripts/start-anvil.sh:ro
        networks:
            - sail
networks:
    sail:
        driver: bridge
volumes:
    sail-pgsql:
        driver: local
    sail-redis:
        driver: local
    bitcoind-data:
    litecoind-data:
    dashd-data:
